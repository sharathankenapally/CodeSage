openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Legacy Java Modernization Agent API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analyses
    description: Modernization analysis sessions
  - name: analyze
    description: AI analysis operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /analyses:
    get:
      operationId: listAnalyses
      tags: [analyses]
      summary: List all analysis sessions
      responses:
        "200":
          description: List of analyses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Analysis"
    post:
      operationId: createAnalysis
      tags: [analyses]
      summary: Create a new analysis session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnalysisBody"
      responses:
        "201":
          description: Analysis created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analysis"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analyses/{id}:
    get:
      operationId: getAnalysis
      tags: [analyses]
      summary: Get an analysis session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Analysis found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analysis"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAnalysis
      tags: [analyses]
      summary: Delete an analysis session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analyses/{id}/repositories:
    get:
      operationId: listRepositories
      tags: [analyses]
      summary: List repositories in an analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of repositories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Repository"
    post:
      operationId: createRepository
      tags: [analyses]
      summary: Add a repository to an analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRepositoryBody"
      responses:
        "201":
          description: Repository created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Repository"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analyses/{id}/repositories/{repoId}:
    delete:
      operationId: deleteRepository
      tags: [analyses]
      summary: Remove a repository from an analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: repoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analyses/{id}/results:
    get:
      operationId: listResults
      tags: [analyses]
      summary: List all generated results for an analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnalysisResult"

  /github/fetch:
    post:
      operationId: fetchGithubRepo
      tags: [analyses]
      summary: Fetch Java files from a GitHub repository
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FetchGithubRepoBody"
      responses:
        "200":
          description: Repository Java code fetched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchGithubRepoResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Could not fetch repository
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analyze/{id}/step/{step}:
    post:
      operationId: runAnalysisStep
      tags: [analyze]
      summary: Run a specific analysis step (SSE streaming)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: step
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 6
      responses:
        "200":
          description: SSE stream of analysis output
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analyze/{id}/full:
    post:
      operationId: runFullAnalysis
      tags: [analyze]
      summary: Run all 6 analysis steps sequentially (SSE streaming)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SSE stream of full analysis output
          content:
            text/event-stream:
              schema:
                type: string
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Analysis:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, in_progress, completed, failed]
        currentStep:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - status
        - createdAt
        - updatedAt

    CreateAnalysisBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
      required:
        - name

    Repository:
      type: object
      properties:
        id:
          type: integer
        analysisId:
          type: integer
        name:
          type: string
        javaCode:
          type: string
        packageStructure:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - analysisId
        - name
        - javaCode
        - createdAt

    CreateRepositoryBody:
      type: object
      properties:
        name:
          type: string
        javaCode:
          type: string
        packageStructure:
          type: ["string", "null"]
      required:
        - name
        - javaCode

    AnalysisResult:
      type: object
      properties:
        id:
          type: integer
        analysisId:
          type: integer
        step:
          type: integer
        stepName:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - analysisId
        - step
        - stepName
        - content
        - createdAt

    FetchGithubRepoBody:
      type: object
      properties:
        repoUrl:
          type: string
          description: "GitHub repository URL (e.g. https://github.com/owner/repo)"
        branch:
          type: ["string", "null"]
          description: "Branch to fetch (defaults to the repo default branch)"
        githubToken:
          type: ["string", "null"]
          description: "Optional GitHub personal access token for private repos"
        maxFiles:
          type: ["integer", "null"]
          description: "Maximum number of Java files to fetch (default 100)"
      required:
        - repoUrl

    FetchGithubRepoResponse:
      type: object
      properties:
        name:
          type: string
          description: "Repository name (owner/repo)"
        javaCode:
          type: string
          description: "Concatenated Java source code from all .java files"
        packageStructure:
          type: string
          description: "File tree of the repository"
        fileCount:
          type: integer
          description: "Number of Java files fetched"
        truncated:
          type: boolean
          description: "Whether the fetch was truncated due to maxFiles limit"
      required:
        - name
        - javaCode
        - packageStructure
        - fileCount
        - truncated
